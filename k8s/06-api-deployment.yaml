apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-api
  namespace: mongoapi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo-api
  template:
    metadata:
      labels:
        app: mongo-api
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: mongo-api
          image: ghcr.io/anton1990/mongo-api:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: api-config
          env:
            - name: DOTNET_GCConserveMemory
              value: "7"                  # агрессивная очистка памяти (0-9, где 9 максимум)
            - name: DOTNET_GCHeapHardLimit
              value: "209715200"          # 200Mi — жёсткий лимит кучи GC в байтах
            - name: DOTNET_GCHighMemPercent
              value: "75"                 # запускать GC когда использовано 75% лимита
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
