apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo-express
  namespace: mongoapi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mongo-express
  template:
    metadata:
      labels:
        app: mongo-express
    spec:
      containers:
        - name: mongo-express
          image: mongo-express:latest
          ports:
            - containerPort: 8081
          env:
            - name: ME_CONFIG_MONGODB_URL
              value: "mongodb://mongo-0.mongo-headless.mongoapi.svc.cluster.local:27017,mongo-1.mongo-headless.mongoapi.svc.cluster.local:27017,mongo-2.mongo-headless.mongoapi.svc.cluster.local:27017,mongo-3.mongo-headless.mongoapi.svc.cluster.local:27017,mongo-4.mongo-headless.mongoapi.svc.cluster.local:27017/?replicaSet=rs0"
            - name: ME_CONFIG_BASICAUTH
              value: "false"
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: mongo-express
  namespace: mongoapi
spec:
  type: NodePort
  selector:
    app: mongo-express
  ports:
    - port: 8081
      targetPort: 8081
      nodePort: 30081
