apiVersion: v1
kind: ConfigMap
metadata:
  name: rabbitmq-config
  namespace: mongoapi
data:
  rabbitmq.conf: |
    loopback_users = none
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rabbitmq
  namespace: mongoapi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rabbitmq
  template:
    metadata:
      labels:
        app: rabbitmq
    spec:
      containers:
        - name: rabbitmq
          image: rabbitmq:3-management
          ports:
            - containerPort: 5672    # AMQP (для сервисов внутри кластера)
            - containerPort: 15672   # Management UI
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          volumeMounts:
            - name: rabbitmq-config
              mountPath: /etc/rabbitmq/rabbitmq.conf
              subPath: rabbitmq.conf
      volumes:
        - name: rabbitmq-config
          configMap:
            name: rabbitmq-config
---
apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: mongoapi
spec:
  selector:
    app: rabbitmq
  type: NodePort
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
    - name: management
      port: 15672
      targetPort: 15672
      nodePort: 30082   # RabbitMQ UI: http://localhost:30082
