apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: mongoapi
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        url: http://prometheus:9090
        isDefault: true
        editable: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: mongoapi
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: default
        folder: MongoApi
        type: file
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-dotnet
  namespace: mongoapi
data:
  dotnet-gc.json: |
    {
      "title": ".NET GC & Memory",
      "uid": "dotnet-gc",
      "version": 100,
      "schemaVersion": 38,
      "refresh": "5s",
      "time": { "from": "now-15m", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "GC Heap Size by Generation",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 0, "w": 12, "h": 8 },
          "targets": [
            { "expr": "system_runtime_gen_0_size{job=\"mongo-api\"}", "legendFormat": "Gen0" },
            { "expr": "system_runtime_gen_1_size{job=\"mongo-api\"}", "legendFormat": "Gen1" },
            { "expr": "system_runtime_gen_2_size{job=\"mongo-api\"}", "legendFormat": "Gen2" },
            { "expr": "system_runtime_loh_size{job=\"mongo-api\"}", "legendFormat": "LOH" },
            { "expr": "system_runtime_poh_size{job=\"mongo-api\"}", "legendFormat": "POH" }
          ],
          "fieldConfig": { "defaults": { "unit": "bytes" } },
          "datasource": "Prometheus"
        },
        {
          "id": 2,
          "title": "GC Collections per second",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 0, "w": 12, "h": 8 },
          "targets": [
            { "expr": "rate(system_runtime_gen_0_gc_count_total{job=\"mongo-api\"}[30s])", "legendFormat": "Gen0/s" },
            { "expr": "rate(system_runtime_gen_1_gc_count_total{job=\"mongo-api\"}[30s])", "legendFormat": "Gen1/s" },
            { "expr": "rate(system_runtime_gen_2_gc_count_total{job=\"mongo-api\"}[30s])", "legendFormat": "Gen2/s" }
          ],
          "fieldConfig": { "defaults": { "unit": "ops" } },
          "datasource": "Prometheus"
        },
        {
          "id": 3,
          "title": "Process Memory (MB)",
          "type": "timeseries",
          "gridPos": { "x": 0, "y": 8, "w": 12, "h": 8 },
          "targets": [
            { "expr": "system_runtime_working_set{job=\"mongo-api\"}", "legendFormat": "Working Set" },
            { "expr": "system_runtime_gc_heap_size{job=\"mongo-api\"}", "legendFormat": "GC Heap" },
            { "expr": "system_runtime_gc_committed{job=\"mongo-api\"}", "legendFormat": "GC Committed" }
          ],
          "fieldConfig": { "defaults": { "unit": "mbytes" } },
          "datasource": "Prometheus"
        },
        {
          "id": 4,
          "title": "HTTP Requests per second",
          "type": "timeseries",
          "gridPos": { "x": 12, "y": 8, "w": 12, "h": 8 },
          "targets": [
            { "expr": "rate(http_requests_received_total{job=\"mongo-api\"}[30s])", "legendFormat": "{{method}} {{action}}" }
          ],
          "fieldConfig": { "defaults": { "unit": "reqps" } },
          "datasource": "Prometheus"
        },
        {
          "id": 5,
          "title": "% Time in GC",
          "type": "gauge",
          "gridPos": { "x": 0, "y": 16, "w": 6, "h": 6 },
          "targets": [
            { "expr": "system_runtime_time_in_gc{job=\"mongo-api\"}", "legendFormat": "% in GC" }
          ],
          "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "max": 100 } },
          "datasource": "Prometheus"
        },
        {
          "id": 6,
          "title": "GC Fragmentation (%)",
          "type": "gauge",
          "gridPos": { "x": 6, "y": 16, "w": 6, "h": 6 },
          "targets": [
            { "expr": "system_runtime_gc_fragmentation{job=\"mongo-api\"}", "legendFormat": "Fragmentation" }
          ],
          "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "max": 100 } },
          "datasource": "Prometheus"
        },
        {
          "id": 7,
          "title": "GC Gen0 Budget (MB)",
          "type": "stat",
          "gridPos": { "x": 12, "y": 16, "w": 6, "h": 6 },
          "targets": [
            { "expr": "system_runtime_gen_0_gc_budget{job=\"mongo-api\"}", "legendFormat": "Gen0 budget" }
          ],
          "fieldConfig": { "defaults": { "unit": "mbytes" } },
          "datasource": "Prometheus"
        },
        {
          "id": 8,
          "title": "Total GC Pause Time (ms)",
          "type": "timeseries",
          "gridPos": { "x": 18, "y": 16, "w": 6, "h": 6 },
          "targets": [
            { "expr": "rate(system_runtime_total_pause_time_by_gc_total{job=\"mongo-api\"}[30s])", "legendFormat": "Pause ms/s" }
          ],
          "fieldConfig": { "defaults": { "unit": "ms" } },
          "datasource": "Prometheus"
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: mongoapi
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:10.4.2
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "true"
            - name: GF_AUTH_ANONYMOUS_ORG_ROLE
              value: "Viewer"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboards-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboards-provider
          configMap:
            name: grafana-dashboards-provider
        - name: dashboards
          configMap:
            name: grafana-dashboard-dotnet
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: mongoapi
spec:
  selector:
    app: grafana
  type: NodePort
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30030   # http://localhost:30030
