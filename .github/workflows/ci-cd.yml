name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: anton1990/mongo-api              # всегда lowercase — требование Docker
  NOTIFICATION_IMAGE_NAME: anton1990/notification-service

jobs:
  # ─── Job 1: сборка и тесты ───────────────────────────────────────────────
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release

      - name: Test
        run: dotnet test --no-build -c Release --verbosity normal

  # ─── Job 2: Docker build + push MongoApi ────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Job 3: Docker build + push NotificationService ─────────────────────
  docker-notification:
    name: Docker Build & Push NotificationService
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    outputs:
      image_tag: ${{ steps.meta-notification.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta-notification
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.NOTIFICATION_IMAGE_NAME }}
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=latest

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: NotificationService/Dockerfile
          push: true
          tags: ${{ steps.meta-notification.outputs.tags }}
          labels: ${{ steps.meta-notification.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Job 4: деплой в Kubernetes ─────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: self-hosted
    needs: [docker, docker-notification]
    if: github.ref == 'refs/heads/master'
    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        run: |
          $sha = "${{ github.sha }}".Substring(0, 7)
          "sha=$sha" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8

      - name: Set kubectl context
        run: kubectl config use-context docker-desktop

      - name: Import Secrets from HCP Vault
        uses: hashicorp/vault-action@v3
        with:
          url: ${{ secrets.VAULT_ADDR }}
          token: ${{ secrets.VAULT_TOKEN }}
          namespace: admin
          secrets: |
            secret/data/dev ConnectionStrings__EnterARContext | DB_ENTERARCONTEXT ;
            secret/data/dev Security__EnterAR__SymmetricSecurityKey | JWT_KEY ;

      - name: Debug - Print Vault secrets (masked)
        run: |
          echo "DB_ENTERARCONTEXT=${{ env.DB_ENTERARCONTEXT }}"
          echo "JWT_KEY=${{ env.JWT_KEY }}"

      - name: Create k8s Secret from Vault
        run: |
          kubectl apply -f k8s/00-namespace.yaml
          kubectl create secret generic vault-secrets `
            "--from-literal=ConnectionStrings__EnterARContext=${{ env.DB_ENTERARCONTEXT }}" `
            "--from-literal=Security__EnterAR__SymmetricSecurityKey=${{ env.JWT_KEY }}" `
            --namespace mongoapi `
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Apply K8s manifests
        run: |
          kubectl apply -f k8s/00-namespace.yaml
          kubectl create secret docker-registry ghcr-secret `
            --docker-server=ghcr.io `
            --docker-username=${{ github.actor }} `
            --docker-password=${{ secrets.GITHUB_TOKEN }} `
            --namespace mongoapi `
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f k8s/02-mongo-headless-svc.yaml
          kubectl apply -f k8s/03-mongo-statefulset.yaml
          kubectl apply -f k8s/05-api-configmap.yaml
          kubectl apply -f k8s/06-api-deployment.yaml
          kubectl apply -f k8s/07-api-service.yaml
          kubectl apply -f k8s/09-mongo-express.yaml
          kubectl apply -f k8s/11-cluster-issuer.yaml
          kubectl apply -f k8s/10-ingress.yaml
          kubectl apply -f k8s/12-rabbitmq.yaml
          kubectl apply -f k8s/13-notification-configmap.yaml
          kubectl apply -f k8s/14-notification-deployment.yaml
          kubectl apply -f k8s/15-prometheus.yaml
          kubectl apply -f k8s/16-grafana.yaml

      - name: Ensure MongoDB ReplicaSet is healthy
        run: |
          kubectl rollout status statefulset/mongo --namespace mongoapi --timeout=120s
          $rsOk = kubectl exec mongo-0 --namespace mongoapi -- `
            mongosh --quiet --eval "try { rs.status().ok } catch(e) { 0 }" 2>&1
          if ($rsOk -ne "1") {
            Write-Host "ReplicaSet not healthy (status=$rsOk), forcing reconfig..."
            kubectl exec mongo-0 --namespace mongoapi -- mongosh --quiet --eval @"
              rs.reconfig({
                _id: 'rs0',
                members: [
                  {_id:0, host:'mongo-0.mongo-headless:27017', priority:2},
                  {_id:1, host:'mongo-1.mongo-headless:27017', priority:1},
                  {_id:2, host:'mongo-2.mongo-headless:27017', priority:1},
                  {_id:3, host:'mongo-3.mongo-headless:27017', priority:1},
                  {_id:4, host:'mongo-4.mongo-headless:27017', priority:1}
                ]
              }, {force: true})
"@
          } else {
            Write-Host "ReplicaSet is healthy"
          }

      - name: Update API image
        run: |
          kubectl set image deployment/mongo-api `
            mongo-api=ghcr.io/${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.sha }} `
            --namespace mongoapi

      - name: Update NotificationService image
        run: |
          kubectl set image deployment/notification-service `
            notification-service=ghcr.io/${{ env.NOTIFICATION_IMAGE_NAME }}:${{ steps.tag.outputs.sha }} `
            --namespace mongoapi

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/mongo-api `
            --namespace mongoapi `
            --timeout=120s
          kubectl rollout status deployment/notification-service `
            --namespace mongoapi `
            --timeout=120s
